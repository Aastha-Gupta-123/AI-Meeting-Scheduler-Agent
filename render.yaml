services:
  - type: web
    name: ai-meeting-scheduler
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: LLM_PROVIDER
        value: mock
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
